<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rain View</title>
  <meta name="description" content="Cinematic rain on glass — ambient scenes with real rain audio and gentle piano.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ═══════════ SPLASH SCREEN ═══════════ -->
  <div id="splash" class="splash">
    <div class="splash-bg">
      <img src="assets/splash-rain-window.jpg" alt="" class="splash-img">
      <div class="splash-overlay"></div>
    </div>
    <div class="splash-content">
      <div class="splash-logo">
        <svg width="40" height="40" viewBox="0 0 40 40" fill="none" aria-hidden="true">
          <path d="M20 4C20 4 8 18 8 26a12 12 0 0024 0C32 18 20 4 20 4z" stroke="currentColor" stroke-width="1.5" fill="none" opacity="0.7"/>
          <path d="M20 10C20 10 13 19 13 24a7 7 0 0014 0C27 19 20 10 20 10z" stroke="currentColor" stroke-width="1" fill="none" opacity="0.4"/>
        </svg>
      </div>
      <h1 class="splash-title">Rain View</h1>
      <p class="splash-subtitle">Find stillness in the rain</p>
      <div class="splash-scenes">
        <button class="scene-card" data-scene="asian-city">
          <img src="assets/scene-asian-city.jpg" alt="Shibuya in the rain" loading="eager">
          <div class="scene-card-info">
            <span class="scene-card-name">Tokyo Evening</span>
            <span class="scene-card-desc">Neon-lit streets through rain-kissed glass</span>
          </div>
        </button>
        <button class="scene-card" data-scene="ny-city">
          <img src="assets/scene-ny-city.jpg" alt="Manhattan in the rain" loading="eager">
          <div class="scene-card-info">
            <span class="scene-card-name">New York Night</span>
            <span class="scene-card-desc">Manhattan skyline, steam, and amber light</span>
          </div>
        </button>
        <button class="scene-card" data-scene="autumn-cabin">
          <img src="assets/scene-autumn-cabin.jpg" alt="Autumn forest cabin" loading="eager">
          <div class="scene-card-info">
            <span class="scene-card-name">Autumn Forest</span>
            <span class="scene-card-desc">Immersed in fall foliage and mountain mist</span>
          </div>
        </button>
        <button class="scene-card" data-scene="japanese-garden">
          <img src="assets/scene-japanese-garden.jpg" alt="Japanese garden in rain" loading="eager">
          <div class="scene-card-info">
            <span class="scene-card-name">Zen Garden</span>
            <span class="scene-card-desc">Cherry blossoms and rain on still water</span>
          </div>
        </button>
      </div>
    </div>
  </div>

  <!-- ═══════════ MAIN SCENE VIEW ═══════════ -->
  <div id="scene-view" class="scene-view hidden">

    <!-- Background image -->
    <div id="scene-bg" class="scene-bg">
      <img id="scene-img" src="" alt="" class="scene-bg-img">
    </div>

    <!-- Rain canvas overlay (transparent, on top of image) -->
    <canvas id="rain-canvas"></canvas>

    <!-- Controls overlay (auto-hides) -->
    <div id="controls" class="controls">

      <!-- Top bar: back + scene title -->
      <div class="controls-top">
        <button id="btn-back" class="btn-icon" aria-label="Back to scenes">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <path d="M13 4L7 10L13 16" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <span id="scene-title" class="controls-title"></span>
      </div>

      <!-- Bottom bar: rain + piano variants, volume -->
      <div class="controls-bottom">
        <div class="control-group">
          <label class="control-label">Rain</label>
          <div id="rain-variants" class="pill-group">
            <button class="pill" data-rain="gentle">Gentle</button>
            <button class="pill" data-rain="heavy">Heavy</button>
            <button class="pill" data-rain="window">Window</button>
            <button class="pill" data-rain="forest">Forest</button>
            <button class="pill" data-rain="thunder">Thunder</button>
          </div>
        </div>
        <div class="control-group">
          <label class="control-label">Piano</label>
          <div id="piano-variants" class="pill-group">
            <button class="pill" data-piano="contemplative">Contemplative</button>
            <button class="pill" data-piano="jazz">Jazz</button>
            <button class="pill" data-piano="melancholic">Melancholic</button>
            <button class="pill" data-piano="ethereal">Ethereal</button>
            <button class="pill" data-piano="pastoral">Pastoral</button>
          </div>
        </div>
        <div class="control-group volume-group">
          <div class="volume-control">
            <label class="control-label">Rain Vol</label>
            <input type="range" id="rain-volume" min="0" max="100" value="60" class="volume-slider">
          </div>
          <div class="volume-control">
            <label class="control-label">Piano Vol</label>
            <input type="range" id="piano-volume" min="0" max="100" value="30" class="volume-slider">
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="rain-canvas.js"></script>
  <script src="audio-engine.js"></script>
  <script src="app.js"></script>
</body>
</html>
